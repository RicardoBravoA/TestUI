name: Android UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # KVM: acelera el emulador (boot ~15s vs ~2min sin KVM). Requerido en Linux.
      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant execute permission for gradlew
        run: chmod +x Test-android/gradlew
        working-directory: .

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/build-cache
            Test-android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('Test-android/**/*.gradle*', 'Test-android/gradle/locks/*.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run Android Emulator and UI tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 600
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: true
          # Con KVM el emulador puede usar -accel; -gpu swiftshader_indirect es estable en runners sin GPU
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: Test-android
          script: ./gradlew connectedDebugAndroidTest --no-daemon
