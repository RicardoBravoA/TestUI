name: Android UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x Test-android/gradlew
        working-directory: .

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            Test-android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('Test-android/**/*.gradle*', 'Test-android/gradle/locks/*.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run Android Emulator and UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: Test-android
          script: ./gradlew connectedDebugAndroidTest --no-daemon --no-build-cache