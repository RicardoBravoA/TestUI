name: Android UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # KVM: acelera el emulador (boot ~15s vs ~2min sin KVM). Requerido en Linux.
      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant execute permission for gradlew
        run: chmod +x Test-android/gradlew
        working-directory: .

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/build-cache
            Test-android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('Test-android/**/*.gradle*', 'Test-android/gradle/locks/*.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      # Si el job falla al TERMINAR el emulador ("stop: Not implemented"), es un bug conocido
      # del action; los tests pueden haber pasado. Usamos continue-on-error + verificación abajo.
      - name: Run Android Emulator and UI tests
        id: emulator-tests
        uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: true
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics
          disable-animations: true
          working-directory: Test-android
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Fail job if tests actually failed
        if: always() && steps.emulator-tests.outcome == 'failure'
        run: |
          EXIT_FILE="Test-android/app/build/outputs/androidTest-results/connected/debug/test-result-exit-code.txt"
          if [ -f "$EXIT_FILE" ] && [ "$(cat "$EXIT_FILE")" = "0" ]; then
            echo "Tests passed (exit code 0). Step failed only due to emulator shutdown (stop: Not implemented)."
            exit 0
          fi
          echo "Tests failed or did not run. Failing job."
          exit 1
